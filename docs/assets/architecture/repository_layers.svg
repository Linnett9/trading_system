<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Repository layer diagram</title>
  <desc id="desc">Dependency direction from main.py through application services into config, core, infrastructure, and generated outputs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:1.5; rx:8; }
      .core { fill:#eef2ff; stroke:#4f46e5; }
      .app { fill:#ecfeff; stroke:#0891b2; }
      .out { fill:#fefce8; stroke:#ca8a04; }
      .test { fill:#f0fdf4; stroke:#16a34a; }
      .label { font: 14px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .small { font: 12px Arial, sans-serif; fill:#334155; text-anchor:middle; }
      .line { stroke:#334155; stroke-width:1.7; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:1.4; fill:none; stroke-dasharray:5 4; marker-end:url(#arrow); }
    </style>
  </defs>

  <text x="550" y="36" class="label" style="font-size:22px;font-weight:700">Repository Layers</text>

  <rect x="460" y="70" width="180" height="48" class="box app"/>
  <text x="550" y="99" class="label">main.py</text>

  <rect x="430" y="150" width="240" height="54" class="box app"/>
  <text x="550" y="182" class="label">application/cli.py</text>

  <rect x="400" y="240" width="300" height="58" class="box app"/>
  <text x="550" y="264" class="label">application/services/</text>
  <text x="550" y="283" class="small">orchestrates workflows</text>

  <rect x="70" y="370" width="150" height="52" class="box"/>
  <text x="145" y="392" class="label">config/</text>
  <text x="145" y="411" class="small">defaults/loaders</text>

  <rect x="250" y="370" width="150" height="52" class="box"/>
  <text x="325" y="392" class="label">configs/</text>
  <text x="325" y="411" class="small">profiles/YAML</text>

  <rect x="450" y="350" width="200" height="52" class="box core"/>
  <text x="550" y="372" class="label">core/</text>
  <text x="550" y="391" class="small">domain logic</text>

  <rect x="690" y="370" width="180" height="52" class="box"/>
  <text x="780" y="392" class="label">infrastructure/</text>
  <text x="780" y="411" class="small">external adapters</text>

  <rect x="900" y="370" width="150" height="52" class="box core"/>
  <text x="975" y="392" class="label">strategies/</text>
  <text x="975" y="411" class="small">signals</text>

  <rect x="360" y="470" width="190" height="52" class="box core"/>
  <text x="455" y="492" class="label">core/research/</text>
  <text x="455" y="511" class="small">research workflows</text>

  <rect x="580" y="470" width="210" height="52" class="box core"/>
  <text x="685" y="492" class="label">research/framework/</text>
  <text x="685" y="511" class="small">shared utilities</text>

  <rect x="360" y="570" width="190" height="52" class="box core"/>
  <text x="455" y="592" class="label">core/research/ml/</text>
  <text x="455" y="611" class="small">ML research</text>

  <rect x="580" y="570" width="230" height="52" class="box core"/>
  <text x="695" y="592" class="label">ml/stock_level/</text>
  <text x="695" y="611" class="small">stock-alpha</text>

  <rect x="90" y="575" width="125" height="45" class="box out"/>
  <text x="152" y="603" class="label">cache/</text>
  <rect x="90" y="635" width="125" height="45" class="box out"/>
  <text x="152" y="663" class="label">reports/</text>
  <rect x="235" y="635" width="125" height="45" class="box out"/>
  <text x="297" y="663" class="label">logs/</text>

  <rect x="870" y="575" width="150" height="52" class="box test"/>
  <text x="945" y="597" class="label">tests/</text>
  <text x="945" y="616" class="small">validate layers</text>

  <path d="M550 118 L550 150" class="line"/>
  <path d="M550 204 L550 240" class="line"/>
  <path d="M460 298 L170 370" class="line"/>
  <path d="M500 298 L350 370" class="line"/>
  <path d="M550 298 L550 350" class="line"/>
  <path d="M620 298 L760 370" class="line"/>
  <path d="M620 402 L900 392" class="line"/>
  <path d="M520 402 L455 470" class="line"/>
  <path d="M570 402 L685 470" class="line"/>
  <path d="M455 522 L455 570" class="line"/>
  <path d="M550 596 L580 596" class="line"/>
  <path d="M450 298 L152 575" class="line"/>
  <path d="M430 298 L152 635" class="line"/>
  <path d="M475 298 L297 635" class="line"/>
  <path d="M870 600 L790 600" class="dash"/>
  <path d="M870 596 L700 376" class="dash"/>
</svg>
