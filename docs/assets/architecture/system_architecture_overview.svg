<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">System architecture overview</title>
  <desc id="desc">High-level repository architecture from CLI and application orchestration through config, core domain, research-only modules, infrastructure adapters, generated outputs, and tests, including a blocked research-to-execution path.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <style>
      .page { fill:#ffffff; }
      .region { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; rx:12; }
      .appRegion { fill:#ecfeff; stroke:#0891b2; }
      .configRegion { fill:#fff7ed; stroke:#ea580c; }
      .coreRegion { fill:#eef2ff; stroke:#4f46e5; }
      .researchRegion { fill:#f0fdf4; stroke:#16a34a; }
      .infraRegion { fill:#f5f3ff; stroke:#7c3aed; }
      .outputRegion { fill:#fefce8; stroke:#ca8a04; }
      .executionRegion { fill:#fff1f2; stroke:#e11d48; }
      .testRegion { fill:#f1f5f9; stroke:#64748b; }
      .box { fill:#ffffff; stroke:#334155; stroke-width:1.4; rx:8; }
      .appBox { fill:#cffafe; stroke:#0891b2; }
      .configBox { fill:#ffedd5; stroke:#ea580c; }
      .coreBox { fill:#e0e7ff; stroke:#4f46e5; }
      .researchBox { fill:#dcfce7; stroke:#16a34a; }
      .infraBox { fill:#ede9fe; stroke:#7c3aed; }
      .outputBox { fill:#fef9c3; stroke:#ca8a04; }
      .executionBox { fill:#ffe4e6; stroke:#e11d48; }
      .testBox { fill:#e2e8f0; stroke:#64748b; }
      .titleText { font:700 24px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .regionTitle { font:700 14px Arial, sans-serif; fill:#0f172a; letter-spacing:0; }
      .label { font:700 13px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .small { font:12px Arial, sans-serif; fill:#334155; text-anchor:middle; }
      .note { font:12px Arial, sans-serif; fill:#475569; text-anchor:middle; }
      .line { stroke:#334155; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:1.6; fill:none; stroke-dasharray:6 5; marker-end:url(#arrow); }
      .blocked { stroke:#dc2626; stroke-width:2.4; fill:none; stroke-dasharray:8 6; marker-end:url(#redArrow); }
      .blockedText { font:700 12px Arial, sans-serif; fill:#dc2626; text-anchor:middle; }
    </style>
  </defs>

  <rect width="1280" height="900" class="page"/>
  <text x="640" y="36" class="titleText">System Architecture Overview</text>
  <text x="640" y="58" class="note">Orchestration, domain logic, research, adapters, outputs, and test boundaries</text>

