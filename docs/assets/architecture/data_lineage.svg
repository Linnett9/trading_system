<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Data lineage diagram</title>
  <desc id="desc">Data lineage from raw Stooq files and reference data into stock-alpha artifacts, OOS predictions, and reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:1.5; rx:8; }
      .data { fill:#eff6ff; stroke:#2563eb; }
      .ref { fill:#f0fdf4; stroke:#16a34a; }
      .label { font:14px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .small { font:12px Arial, sans-serif; fill:#334155; text-anchor:middle; }
      .title { font:22px Arial, sans-serif; font-weight:700; fill:#0f172a; text-anchor:middle; }
      .line { stroke:#334155; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:1.5; fill:none; stroke-dasharray:5 4; marker-end:url(#arrow); }
      .warn { fill:#fff1f2; stroke:#e11d48; }
    </style>
  </defs>
  <text x="560" y="36" class="title">Data Lineage</text>

  <rect x="60" y="95" width="165" height="56" class="box data"/>
  <text x="142" y="119" class="label">Raw Stooq</text>
  <text x="142" y="139" class="small">daily files</text>

  <rect x="280" y="95" width="165" height="56" class="box data"/>
  <text x="362" y="119" class="label">Stooq parquet</text>
  <text x="362" y="139" class="small">processed prices</text>

  <rect x="500" y="95" width="180" height="56" class="box data"/>
  <text x="590" y="119" class="label">Expanded dataset</text>
  <text x="590" y="139" class="small">cache/ml profile</text>

  <rect x="735" y="95" width="170" height="56" class="box"/>
  <text x="820" y="119" class="label">Stock artifact</text>
  <text x="820" y="139" class="small">symbol x date</text>

  <rect x="735" y="230" width="170" height="56" class="box"/>
  <text x="820" y="254" class="label">Enriched artifact</text>
  <text x="820" y="274" class="small">alpha features</text>

  <rect x="735" y="365" width="170" height="56" class="box"/>
  <text x="820" y="389" class="label">OOS predictions</text>
  <text x="820" y="409" class="small">walk-forward tests</text>

  <rect x="735" y="500" width="170" height="56" class="box"/>
  <text x="820" y="524" class="label">Reports</text>
  <text x="820" y="544" class="small">JSON CSV MD</text>

  <rect x="90" y="245" width="165" height="56" class="box ref"/>
  <text x="172" y="269" class="label">Universe YAMLs</text>
  <text x="172" y="289" class="small">symbol set</text>

  <rect x="90" y="335" width="165" height="56" class="box ref"/>
  <text x="172" y="359" class="label">Sector ref</text>
  <text x="172" y="379" class="small">sector metadata</text>

  <rect x="90" y="425" width="165" height="56" class="box ref"/>
  <text x="172" y="449" class="label">Market symbol</text>
  <text x="172" y="469" class="small">SPY default</text>

  <rect x="350" y="245" width="180" height="56" class="box ref"/>
  <text x="440" y="269" class="label">Point-in-time</text>
  <text x="440" y="289" class="small">features only</text>

  <rect x="350" y="405" width="180" height="56" class="box warn"/>
  <text x="440" y="429" class="label">Future labels</text>
  <text x="440" y="449" class="small">train/evaluate only</text>

  <path d="M225 123 L280 123" class="line"/>
  <path d="M445 123 L500 123" class="line"/>
  <path d="M680 123 L735 123" class="line"/>
  <path d="M820 151 L820 230" class="line"/>
  <path d="M820 286 L820 365" class="line"/>
  <path d="M820 421 L820 500" class="line"/>

  <path d="M255 273 C410 273 570 123 735 123" class="line"/>
  <path d="M255 363 C420 363 570 138 735 123" class="line"/>
  <path d="M255 453 C450 453 575 152 735 123" class="line"/>
  <path d="M362 151 C340 210 380 230 440 245" class="line"/>
  <path d="M530 273 C620 245 690 170 735 138" class="line"/>
  <path d="M362 151 C320 330 365 390 440 405" class="dash"/>
  <path d="M530 433 C630 405 700 160 735 140" class="dash"/>
</svg>
