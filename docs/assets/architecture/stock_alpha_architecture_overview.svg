<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Stock-alpha architecture overview</title>
  <desc id="desc">High-level stock-alpha architecture from inputs through artifacts, feature engineering, model evaluation, portfolio research simulations, validation reports, guardrails, and blocked broker order path.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <style>
      .page { fill:#ffffff; }
      .region { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; rx:12; }
      .inputRegion { fill:#eff6ff; stroke:#2563eb; }
      .artifactRegion { fill:#f0fdf4; stroke:#16a34a; }
      .modelRegion { fill:#f5f3ff; stroke:#7c3aed; }
      .portfolioRegion { fill:#ecfeff; stroke:#0891b2; }
      .reportRegion { fill:#fefce8; stroke:#ca8a04; }
      .guardRegion { fill:#fff1f2; stroke:#e11d48; }
      .box { fill:#ffffff; stroke:#334155; stroke-width:1.4; rx:8; }
      .inputBox { fill:#dbeafe; stroke:#2563eb; }
      .artifactBox { fill:#dcfce7; stroke:#16a34a; }
      .modelBox { fill:#ede9fe; stroke:#7c3aed; }
      .portfolioBox { fill:#cffafe; stroke:#0891b2; }
      .reportBox { fill:#fef9c3; stroke:#ca8a04; }
      .guardBox { fill:#ffe4e6; stroke:#e11d48; }
      .titleText { font:700 24px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .regionTitle { font:700 14px Arial, sans-serif; fill:#0f172a; letter-spacing:0; }
      .label { font:700 13px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .small { font:12px Arial, sans-serif; fill:#334155; text-anchor:middle; }
      .note { font:12px Arial, sans-serif; fill:#475569; text-anchor:middle; }
      .line { stroke:#334155; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:1.6; fill:none; stroke-dasharray:6 5; marker-end:url(#arrow); }
      .blocked { stroke:#dc2626; stroke-width:2.4; fill:none; stroke-dasharray:8 6; marker-end:url(#redArrow); }
      .blockedText { font:700 12px Arial, sans-serif; fill:#dc2626; text-anchor:middle; }
    </style>
  </defs>

  <rect width="1280" height="860" class="page"/>
  <text x="640" y="36" class="titleText">Stock-Alpha Architecture Overview</text>
  <text x="640" y="58" class="note">Canonical research pipeline from inputs to reports, with simulations and guardrails kept separate from broker orders</text>

  <rect x="40" y="90" width="260" height="300" class="region inputRegion"/>
  <text x="62" y="116" class="regionTitle">Inputs</text>
  <rect x="70" y="140" width="200" height="38" class="box inputBox"/>
  <text x="170" y="164" class="label">universe YAMLs</text>
  <rect x="70" y="190" width="200" height="38" class="box inputBox"/>
  <text x="170" y="214" class="label">Stooq parquet</text>
  <rect x="70" y="240" width="200" height="38" class="box inputBox"/>
  <text x="170" y="264" class="label">expanded dataset</text>
  <rect x="70" y="290" width="200" height="38" class="box inputBox"/>
  <text x="170" y="314" class="label">meta aux predictions</text>
  <rect x="70" y="340" width="200" height="38" class="box inputBox"/>
  <text x="170" y="356" class="label">sector / SPY</text>
  <text x="170" y="372" class="small">config profile</text>

  <rect x="350" y="90" width="260" height="300" class="region artifactRegion"/>
  <text x="372" y="116" class="regionTitle">Data and artifacts</text>
  <rect x="385" y="145" width="190" height="48" class="box artifactBox"/>
  <text x="480" y="164" class="label">stock-level</text>
  <text x="480" y="182" class="small">prediction artifact</text>
  <rect x="385" y="235" width="190" height="48" class="box artifactBox"/>
  <text x="480" y="254" class="label">enriched</text>
  <text x="480" y="272" class="small">alpha artifact</text>
  <rect x="385" y="325" width="190" height="38" class="box artifactBox"/>
  <text x="480" y="349" class="label">feature audit</text>

  <rect x="660" y="90" width="280" height="300" class="region modelRegion"/>
  <text x="682" y="116" class="regionTitle">Model and evaluation</text>
  <rect x="695" y="140" width="210" height="44" class="box modelBox"/>
  <text x="800" y="158" class="label">baseline ranking</text>
  <text x="800" y="176" class="small">base features</text>
  <rect x="695" y="200" width="210" height="44" class="box modelBox"/>
  <text x="800" y="218" class="label">enriched ranking</text>
  <text x="800" y="236" class="small">alpha features</text>
  <rect x="695" y="260" width="210" height="44" class="box modelBox"/>
  <text x="800" y="278" class="label">target comparison</text>
  <text x="800" y="296" class="small">robustness</text>
  <rect x="695" y="320" width="210" height="44" class="box modelBox"/>
  <text x="800" y="338" class="label">OOS predictions</text>
  <text x="800" y="356" class="small">test dates only</text>

  <rect x="990" y="90" width="250" height="300" class="region portfolioRegion"/>
  <text x="1012" y="116" class="regionTitle">Portfolio research</text>
  <rect x="1020" y="160" width="190" height="50" class="box portfolioBox"/>
  <text x="1115" y="180" class="label">portfolio replay</text>
  <text x="1115" y="198" class="small">simulation only</text>
  <rect x="1020" y="245" width="190" height="50" class="box portfolioBox"/>
  <text x="1115" y="265" class="label">policy sweep</text>
  <text x="1115" y="283" class="small">simulation grid</text>
  <rect x="1020" y="330" width="190" height="38" class="box portfolioBox"/>
  <text x="1115" y="354" class="label">no order placement</text>

  <rect x="350" y="455" width="590" height="195" class="region reportRegion"/>
  <text x="372" y="481" class="regionTitle">Validation and reporting</text>
  <rect x="390" y="515" width="155" height="46" class="box reportBox"/>
  <text x="468" y="533" class="label">experiment</text>
  <text x="468" y="551" class="small">report</text>
  <rect x="565" y="515" width="155" height="46" class="box reportBox"/>
  <text x="643" y="533" class="label">parallelism</text>
  <text x="643" y="551" class="small">audit</text>
  <rect x="740" y="515" width="155" height="46" class="box reportBox"/>
  <text x="818" y="533" class="label">overnight</text>
  <text x="818" y="551" class="small">summary</text>
  <rect x="470" y="585" width="350" height="38" class="box reportBox"/>
  <text x="645" y="609" class="label">canonical output root per run_size</text>

  <rect x="40" y="455" width="260" height="195" class="region guardRegion"/>
  <text x="62" y="481" class="regionTitle">Guardrails</text>
  <rect x="70" y="515" width="200" height="30" class="box guardBox"/>
  <text x="170" y="535" class="label">research_only: true</text>
  <rect x="70" y="555" width="200" height="30" class="box guardBox"/>
  <text x="170" y="575" class="label">trading_impact: none</text>
  <rect x="70" y="595" width="200" height="30" class="box guardBox"/>
  <text x="170" y="615" class="label">production_validated: false</text>

  <rect x="990" y="455" width="250" height="195" class="region guardRegion"/>
  <text x="1012" y="481" class="regionTitle">Execution boundary</text>
  <rect x="1020" y="520" width="190" height="44" class="box reportBox"/>
  <text x="1115" y="538" class="label">research output</text>
  <text x="1115" y="556" class="small">reports + simulations</text>
  <rect x="1020" y="590" width="190" height="44" class="box guardBox"/>
  <text x="1115" y="608" class="label">broker orders</text>
  <text x="1115" y="626" class="small">blocked</text>

  <path d="M270 159 L385 169" class="line"/>
  <path d="M270 209 L385 169" class="line"/>
  <path d="M270 259 L385 169" class="line"/>
  <path d="M270 309 L385 259" class="line"/>
  <path d="M270 359 L385 259" class="line"/>
  <path d="M480 193 L480 235" class="line"/>
  <path d="M480 283 L480 325" class="line"/>
  <path d="M575 169 C630 140 655 162 695 162" class="line"/>
  <path d="M575 259 C620 200 650 222 695 222" class="line"/>
  <path d="M575 259 C625 250 645 282 695 282" class="line"/>
  <path d="M905 162 C950 160 975 185 1020 185" class="line"/>
  <path d="M905 222 C960 220 975 270 1020 270" class="line"/>
  <path d="M905 342 C970 340 970 185 1020 185" class="line"/>
  <path d="M905 342 C970 340 970 270 1020 270" class="line"/>
  <path d="M1115 295 L1115 330" class="line"/>
  <path d="M1115 390 C1095 450 930 495 818 515" class="line"/>
  <path d="M800 364 C775 430 700 470 643 515" class="line"/>
  <path d="M480 363 C480 430 470 470 468 515" class="line"/>
  <path d="M270 555 C310 555 350 545 390 538" class="dash"/>
  <path d="M818 561 L818 585" class="line"/>
  <path d="M1115 564 L1115 590" class="blocked"/>
  <text x="1115" y="579" class="blockedText">research output -X-&gt; broker orders</text>
  <line x1="1099" y1="569" x2="1123" y2="593" stroke="#dc2626" stroke-width="4"/>
  <line x1="1123" y1="569" x2="1099" y2="593" stroke="#dc2626" stroke-width="4"/>

  <text x="640" y="720" class="note">Portfolio replay and policy sweep are simulations over OOS predictions; they do not place orders or authorize trading.</text>
  <text x="640" y="742" class="note">Required guardrail metadata also includes promotion_thresholds_changed: false.</text>
  <text x="640" y="782" class="note">Outputs land under reports/ml/benchmark/regime_transformer_meta_ensemble_v1/stock_alpha/{dev,benchmark,full}/</text>
</svg>
