name: Alpaca Seven-Day Paper Trial

on:
  workflow_dispatch:
  schedule:
    # Weekdays at 21:15 UTC, after the regular US equity session during US daylight time.
    - cron: "15 21 * * 1-5"

permissions:
  contents: read

jobs:
  paper-trial:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Verify Stooq parquet data exists
        run: |
          test -f data/processed/stooq_parquet/AAPL.parquet
          test -f data/processed/stooq_parquet/QQQ.parquet
          ls -lh data/processed/stooq_parquet | head

      - name: Generate approval and submit Alpaca paper orders
        run: |
          if [ "$(date -u +%F)" \> "2026-06-28" ]; then
            echo "The seven-day trial window has ended; no market-data request was made."
            exit 0
          fi

          rm -rf reports/paper/alpaca_7day_trial
          mkdir -p reports/paper/alpaca_7day_trial

          python main.py --mode paper-dry-run --config configs/paper/alpaca_7day_trial.yaml --universe stooq_30

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("reports/paper/alpaca_7day_trial/dry_run_rebalance_plan.json")

          if not path.exists():
              sys.exit("Dry-run plan was not created; refusing to submit orders.")

          plan = json.loads(path.read_text())
          decision = plan.get("final_decision")
          blockers = plan.get("rejected_orders") or plan.get("blockers") or []

          print(f"Dry-run final_decision={decision}")
          print(f"Dry-run blockers={blockers}")

          if decision != "dry_run_only":
              sys.exit("Dry-run was blocked; refusing to submit Alpaca paper orders.")
          PY

          python main.py --mode paper-trading --submit --config configs/paper/alpaca_7day_trial.yaml --universe stooq_30

      - name: Upload trial reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-paper-trial-${{ github.run_id }}
          path: reports/paper/alpaca_7day_trial/
          if-no-files-found: warn