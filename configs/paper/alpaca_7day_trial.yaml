backtest:
  provider: alpaca
  data_feed: iex
  data_adjustment: all
  years: 2
  timeframe: 1Day
paper_trading:
  enabled: true
  submit_orders: true
  execution_adapter: broker
  inspect_broker_state: true
  report_dir: reports/paper/alpaca_7day_trial
  event_log_path: reports/paper/alpaca_7day_trial/events.jsonl
  dashboard_path: reports/paper/alpaca_7day_trial/dashboard.csv
  trial_end_date: '2026-06-28'
  broker_state_source: broker
  sync_broker_state_before_decision: true
risk:
  paper:
    max_position_weight: 0.3
    max_turnover: 0.95
broker:
  adapter: alpaca
  paper: true
  base_url: https://paper-api.alpaca.markets
  starting_cash: 500
  sleeve_cash: 500
  min_order_notional: 1.0
  cash_reconciliation: sleeve
  cash_tolerance: 1.0
  position_tolerance: 1.0e-06
ml:
  historical_data_provider: alpaca
  rebalance_policy: model_triggered
  model_triggered_rebalance:
    research_only: false
    paper_only: true
    allow_paper_submit: false
    evaluate_every_run: true
    candidate:
      source: dual_momentum
      top_n: 5
      weighting: equal
      target_gross_exposure: 0.90
      max_single_name_weight: 0.20
    gates:
      minimum_net_improvement: 0.03
      maximum_turnover: 0.25
      maximum_replacements: 2
      minimum_trade_weight: 0.03
      minimum_confidence: 0.60
      persistence_observations: 1
      persistence_window: 3
      cooldown_trading_days: 0
    costs:
      transaction_cost_bps: 10
      slippage_bps: 5
    safety:
      allow_live_trading: false
      allow_champion_mutation: false
      execution_audit_required: true
research:
  intraday_opening_range:
    enabled: false
    research_only: true
    timeframe: 5Min
    opening_range_minutes: 30
    min_relative_volume: 1.5
    require_vwap_confirmation: true
