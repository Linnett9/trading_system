backtest:
  provider: stooq_parquet
  data_dir: data/processed/stooq_parquet

ml:
  enabled: true
  mode: research
  model_type: market_context_encoder
  shadow_model_type: market_context_encoder
  label_type: should_reduce_exposure
  prediction_target: should_reduce_exposure
  feature_set: expanded_rebalance_v1
  research_label: EXPANDED_REBALANCE_MARKET_CONTEXT_ENCODER_RESEARCH_ONLY
  minimum_history_years: 4
  output_dir: reports/ml/market_context_encoder_should_reduce_exposure
  benchmark_symbols:
    - SPY
    - QQQ
  sequence_length: 64
  market_context_sequence_length: 64
  market_context_hidden_size: 32
  market_context_epochs: 20
  market_context_batch_size: 64
  market_context_learning_rate: 0.001
  market_context_weight_decay: 0.0005
  market_context_dropout: 0.10
  market_context_risk_multiplier_floor: 0.25
  market_context_risk_multiplier_ceiling: 1.25
  comparison_models:
    - market_context_encoder
  overlay_comparison_models:
    - market_context_encoder
  expanded_rebalance_audit_path: reports/ml/expanded_rebalance_dataset_audit.json
  expanded_rebalance_dataset:
    rebalance_frequencies:
      - monthly
      - biweekly
      - weekly
    top_n_values:
      - 3
      - 5
      - 7
    weightings:
      - equal
      - inverse_volatility
    universe_paths:
      - data/reference/universes/current_32.yaml
      - data/reference/universes/us_liquid_100.yaml
    reduce_drawdown_threshold: 0.08
    reduce_excess_return_threshold: -0.01
    reduce_volatility_adjusted_threshold: -0.10
