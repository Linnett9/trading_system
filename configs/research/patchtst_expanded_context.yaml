ml:
  enabled: true
  mode: research
  model_type: patchtst
  shadow_model_type: patchtst
  label_type: champion_success
  prediction_target: champion_success
  feature_set: price_regime_v1
  output_dir: reports/ml/patchtst_expanded_context
  benchmark_symbols:
    - SPY
    - QQQ
    - IWM
    - DIA
    - XLK
    - XLY
    - XLF
    - XLI
    - XLV
    - XLE
    - XLU
    - XLP
    - XLB
    - VNQ
    - TLT
    - IEF
    - SHY
    - BIL
    - GLD
  sequence_length: 126
  patchtst_sequence_length: 126
  patchtst_patch_length: 16
  patchtst_patch_stride: 8
  patchtst_d_model: 64
  patchtst_heads: 4
  patchtst_layers: 2
  patchtst_feedforward: 128
  patchtst_dropout: 0.15
  patchtst_epochs: 30
  patchtst_batch_size: 32
  patchtst_learning_rate: 0.001
  patchtst_weight_decay: 0.0005
  patchtst_pos_weight: auto

  # Single best-transformer candidate: do not run intermediate model comparisons here.
  comparison_models:
    - patchtst
  overlay_comparison_models:
    - patchtst
  shadow_thresholds: [0.2, 0.3, 0.4, 0.5]
  shadow_reduced_exposures: [0.7, 0.8, 0.9]
