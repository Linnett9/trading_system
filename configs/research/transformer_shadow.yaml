# Research-only transformer shadow experiment.
# Does not affect paper/live trading decisions.

ml:
  enabled: true
  mode: research
  model_type: transformer
  shadow_model_type: transformer
  label_type: champion_success
  prediction_horizon: 42
  label_horizon_days: 42
  output_dir: reports/ml/transformer_shadow

  # Keep this intentionally small. The available labelled history is limited,
  # so the first goal is out-of-sample comparison, not a high-capacity model.
  sequence_length: 63
  transformer_d_model: 32
  transformer_heads: 4
  transformer_layers: 2
  transformer_feedforward: 64
  transformer_dropout: 0.10
  transformer_epochs: 20
  transformer_batch_size: 32
  transformer_learning_rate: 0.001
  transformer_weight_decay: 0.0001
  transformer_device: cpu

  walk_forward_folds: 3
  decision_threshold: 0.50
  comparison_models:
    - logistic_regression
    - random_forest
    - gradient_boosting
  shadow_thresholds: [0.10, 0.15, 0.20, 0.25]
  shadow_reduced_exposures: [0.70, 0.80, 0.90]
  shadow_transaction_cost_bps: 5.0
