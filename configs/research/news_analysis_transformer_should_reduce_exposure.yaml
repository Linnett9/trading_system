backtest:
  provider: stooq_parquet
  data_dir: data/processed/stooq_parquet

ml:
  enabled: true
  mode: research
  model_type: news_analysis_transformer
  shadow_model_type: news_analysis_transformer
  label_type: should_reduce_exposure
  prediction_target: should_reduce_exposure
  feature_set: expanded_rebalance_v1
  research_label: EXPANDED_REBALANCE_NEWS_ANALYSIS_TRANSFORMER_RESEARCH_ONLY
  minimum_history_years: 4
  output_dir: reports/ml/news_analysis_transformer_should_reduce_exposure
  benchmark_symbols:
    - SPY
    - QQQ
  sentiment_features_enabled: false
  sentiment_feature_version: sentiment_v1
  sentiment_min_reliability_tier: 2
  sentiment_lookback_windows:
    - 1
    - 5
    - 10
    - 21
  sentiment_require_first_seen_timestamp: true
  sequence_length: 64
  news_transformer_sequence_length: 64
  news_transformer_d_model: 32
  news_transformer_heads: 4
  news_transformer_layers: 1
  news_transformer_feedforward: 64
  news_transformer_dropout: 0.15
  news_transformer_epochs: 20
  news_transformer_batch_size: 64
  news_transformer_learning_rate: 0.001
  news_transformer_weight_decay: 0.0005
  comparison_models:
    - news_analysis_transformer
  overlay_comparison_models:
    - news_analysis_transformer
  expanded_rebalance_audit_path: reports/ml/expanded_rebalance_dataset_audit.json
  expanded_rebalance_dataset:
    rebalance_frequencies:
      - monthly
      - biweekly
      - weekly
    top_n_values:
      - 3
      - 5
      - 7
    weightings:
      - equal
      - inverse_volatility
    universe_paths:
      - data/reference/universes/current_32.yaml
      - data/reference/universes/us_liquid_100.yaml
    reduce_drawdown_threshold: 0.08
    reduce_excess_return_threshold: -0.01
    reduce_volatility_adjusted_threshold: -0.10
