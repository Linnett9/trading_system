backtest:
  provider: stooq_parquet
  data_dir: data/processed/stooq_parquet

ml:
  enabled: true
  mode: research
  model_type: itransformer
  shadow_model_type: itransformer
  label_type: should_reduce_exposure
  prediction_target: should_reduce_exposure
  feature_set: expanded_rebalance_v1
  research_label: EXPANDED_REBALANCE_CURRENT_32_RESEARCH_ONLY
  minimum_history_years: 4
  output_dir: reports/ml/itransformer_should_reduce_exposure
  benchmark_symbols:
    - SPY
    - QQQ
  sequence_length: 64
  itransformer_sequence_length: 64
  itransformer_d_model: 64
  itransformer_heads: 4
  itransformer_layers: 2
  itransformer_feedforward: 128
  itransformer_dropout: 0.15
  itransformer_epochs: 30
  itransformer_batch_size: 64
  itransformer_learning_rate: 0.001
  itransformer_weight_decay: 0.0005
  itransformer_pos_weight: auto
  comparison_models:
    - itransformer
  overlay_comparison_models:
    - itransformer
  expanded_rebalance_audit_path: reports/ml/expanded_rebalance_dataset_audit.json
  expanded_rebalance_dataset:
    rebalance_frequencies:
      - monthly
      - biweekly
      - weekly
    top_n_values:
      - 3
      - 5
      - 7
    weightings:
      - equal
      - inverse_volatility
    universe_paths:
      - data/reference/universes/current_32.yaml
      - data/reference/universes/us_liquid_100.yaml
    reduce_drawdown_threshold: 0.08
    reduce_excess_return_threshold: -0.01
    reduce_volatility_adjusted_threshold: -0.10
