# Research-only transformer experiment for detecting risky future periods.
# This does not affect paper/live trading decisions.

ml:
  enabled: true
  mode: research
  model_type: transformer
  shadow_model_type: transformer
  label_type: drawdown_risk
  prediction_horizon: 42
  label_horizon_days: 42
  drawdown_risk_threshold: 0.10
  output_dir: reports/ml/transformer_drawdown_risk

  # Lower capacity than the first run. The target is rarer/noisier than champion_success.
  sequence_length: 63
  transformer_d_model: 16
  transformer_heads: 4
  transformer_layers: 1
  transformer_feedforward: 32
  transformer_dropout: 0.25
  transformer_epochs: 15
  transformer_batch_size: 32
  transformer_learning_rate: 0.0005
  transformer_weight_decay: 0.001
  transformer_device: cpu

  walk_forward_folds: 3
  decision_threshold: 0.50
  comparison_models:
    - logistic_regression
    - random_forest
    - gradient_boosting
    - transformer

  # For drawdown_risk labels, the enhanced runner converts overlay probability to:
  #   1 - drawdown_risk_probability
  # so these thresholds mean "minimum safe probability".
  shadow_thresholds: [0.65, 0.70, 0.75, 0.80]
  shadow_reduced_exposures: [0.60, 0.70, 0.80]
  shadow_holdout_threshold: 0.70
  shadow_holdout_reduced_exposure: 0.70
  shadow_transaction_cost_bps: 5.0

  overlay_comparison_models:
    - logistic_regression
    - gradient_boosting
    - transformer
  overlay_comparison_thresholds: [0.65, 0.70, 0.75, 0.80]
  overlay_comparison_reduced_exposures: [0.60, 0.70, 0.80]
