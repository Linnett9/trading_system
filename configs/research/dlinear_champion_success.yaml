ml:
  enabled: true
  mode: research
  model_type: dlinear
  shadow_model_type: dlinear
  label_type: champion_success
  prediction_target: champion_success
  feature_set: price_regime_v1
  output_dir: reports/ml/dlinear_champion_success
  sequence_length: 126
  dlinear_sequence_length: 126
  dlinear_epochs: 80
  dlinear_batch_size: 32
  dlinear_learning_rate: 0.001
  dlinear_weight_decay: 0.005
  dlinear_pos_weight: auto
  comparison_models:
    - logistic_regression
    - random_forest
    - gradient_boosting
  overlay_comparison_models:
    - logistic_regression
    - gradient_boosting
    - dlinear
    - patchtst
  shadow_thresholds: [0.2, 0.3, 0.4, 0.5]
  shadow_reduced_exposures: [0.7, 0.8, 0.9]
