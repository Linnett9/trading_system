backtest:
  provider: stooq_parquet
  data_dir: data/processed/stooq_parquet

ml:
  enabled: true
  mode: research
  model_type: temporal_fusion_transformer
  shadow_model_type: temporal_fusion_transformer
  label_type: should_reduce_exposure
  prediction_target: should_reduce_exposure
  feature_set: expanded_rebalance_v1
  research_label: EXPANDED_REBALANCE_TFT_RESEARCH_ONLY
  minimum_history_years: 4
  output_dir: reports/ml/tft_should_reduce_exposure
  benchmark_symbols:
    - SPY
    - QQQ
  sequence_length: 64
  tft_encoder_length: 64
  tft_prediction_horizons:
    - 5
    - 10
  tft_hidden_size: 64
  tft_attention_heads: 4
  tft_lstm_layers: 1
  tft_dropout: 0.15
  tft_epochs: 30
  tft_batch_size: 64
  tft_learning_rate: 0.001
  tft_weight_decay: 0.0005
  tft_known_future_features:
    - day_of_week
    - month
    - is_month_end
    - rebalance_frequency
    - days_until_next_rebalance
  comparison_models:
    - temporal_fusion_transformer
  overlay_comparison_models:
    - temporal_fusion_transformer
  expanded_rebalance_audit_path: reports/ml/expanded_rebalance_dataset_audit.json
  expanded_rebalance_dataset:
    rebalance_frequencies:
      - monthly
      - biweekly
      - weekly
    top_n_values:
      - 3
      - 5
      - 7
    weightings:
      - equal
      - inverse_volatility
    universe_paths:
      - data/reference/universes/current_32.yaml
      - data/reference/universes/us_liquid_100.yaml
    reduce_drawdown_threshold: 0.08
    reduce_excess_return_threshold: -0.01
    reduce_volatility_adjusted_threshold: -0.10
