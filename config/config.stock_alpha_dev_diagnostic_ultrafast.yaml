  stock_ranker_test_window_dates: 10
  stock_ranker_embargo_dates: 2
  stock_alpha_stages:
    stock_artifact: true
    alpha_features: true
    baseline_benchmark: true
    enriched_benchmark: true
    target_comparison: true
    portfolio_replay: false
    portfolio_policy_sweep: false
    experiment_report: true
    attribution: false
